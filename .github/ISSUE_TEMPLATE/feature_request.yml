name: ✨ 功能建议
description: 提出新功能或改进建议。
title: "[Feature] 简要描述你建议的功能"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出功能建议！请描述你的想法，我们会认真评估。

  - type: textarea
    id: problem
    attributes:
      label: 这个功能解决什么问题？
      description: 清晰描述你的需求来源或使用场景中的痛点。
      placeholder: |
        例如：目前播放器不支持 xxxx，导致我在做 yyyy 时需要手动 zzzz...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你期望的解决方案
      description: 描述你希望的功能是什么样的。
      placeholder: |
        例如：希望在"播放器"页面增加一个 xxxx 选项，勾选后可以...

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 是否已有临时解决方法或其他思路？
      placeholder: 例如：目前只能通过修改配置文件来达到类似效果...

  - type: dropdown
    id: scope
    attributes:
      label: 涉及范围
      description: 这个功能大致涉及哪个模块？
      options:
        - 基础（播放控制）
        - 文件（UST / 编码）
        - 播放器（显示样式）
        - 歌词
        - 其他（设置 / 主题 / 界面）
        - 不确定

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 任何其他想法、参考截图或类似软件中的实现方式。
