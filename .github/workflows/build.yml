name: 自动编译 ustPlayer 可执行文件

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # 也可手动触发
  workflow_dispatch:

jobs:
  build:
    # push 时如果 commit 消息以 v（发版）或 pass（跳过 CI）开头，跳过构建
    if: |
      github.event_name != 'push' || (!startsWith(github.event.head_commit.message, 'v') && !startsWith(github.event.head_commit.message, 'pass'))
    runs-on: windows-latest   # 仅构建 Windows 可执行文件

    steps:
    # 1. 检出代码
    - name: 检出代码
      uses: actions/checkout@v4

    # 获取短 commit SHA（如 599799e）
    - name: 获取短 commit SHA
      id: sha
      shell: bash
      run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    # 2. 设置 Python 3.12.9
    - name: 设置 Python 3.12.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.9'
        architecture: 'x64'
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    # 3. 安装依赖（包括 PySide6 等）
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 使用 Nuitka 进行 standalone 打包
    - name: 使用 Nuitka 打包
      uses: Nuitka/Nuitka-Action@main
      with:
        # 重要：将此处改为你的入口脚本文件名
        script-name: main.py

        # 使用最新开发版（稳定版可省略该行，或指定具体版本如 1.8）
        nuitka-version: main

        # 打包模式：standalone（生成文件夹）
        mode: standalone

        # 输出可执行文件名（不含扩展名，Windows 自动加 .exe）
        output-file: ustPlayer

        # 将必要的数据文件复制到可执行文件同级目录
        include-data-files: |
          ERcode.txt=ERcode.txt
          Terms.txt=Terms.txt
          icon.ico=icon.ico

        # 设置 Windows 应用程序图标
        windows-icon-from-ico: icon.ico

        # 启用 PySide6 插件（确保 Qt 资源正确打包）
        enable-plugins: pyside6

        # 如果应用是 GUI 程序，则隐藏控制台窗口
        windows-console-mode: disable

        # 如需启用详细日志，可取消下面一行的注释
        # extra-args: '--verbose'

    # 5. 上传构建产物（build/main.dist/ 文件夹）
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ustPlayer-${{ steps.sha.outputs.short }}-Windows
        path: build/main.dist/
        include-hidden-files: true
